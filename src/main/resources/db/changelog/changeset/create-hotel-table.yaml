databaseChangeLog:
  - changeSet:
      id: create-hotel
      author: Ivan
      changes:
        - createTable:
            tableName: hotels
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(2000)
                  constraints:
                    nullable: false
              - column:
                  name: brand
                  type: varchar(100)
              - column:
                  name: house_number
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: street
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: city
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: country
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: post_code
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: phone
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: check_in
                  type: varchar(10)
                  constraints:
                    nullable: false
              - column:
                  name: check_out
                  type: varchar(20)
                  constraints:
                    nullable: false







